{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Admin Panel</title>
    <style>
        /* ── RESET ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── BASE ── */
        html, body {
            height: 100%;
            font-family: 'Segoe UI', Inter, system-ui, -apple-system, sans-serif;
            background: #f5f6fa;
            color: #1e1e2f;
        }

        /* ── LAYOUT ── */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 48px 36px 40px;
        }

        /* ── HEADER ── */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header .logo-icon {
            width: 52px;
            height: 52px;
            background: #1e1e2f;
            color: #fff;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1e1e2f;
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 14px;
            color: #6b7280;
        }

        /* ── ERROR MESSAGE (hidden by default) ── */
        .error-message {
            display: none;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message.visible {
            display: block;
        }

        /* ── FORM GROUP ── */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            font-size: 14px;
            color: #1e1e2f;
            background: #f9fafb;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            border-color: #1e1e2f;
            background: #fff;
        }

        .form-group input.input-error {
            border-color: #ef4444;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        /* password field needs right padding for toggle */
        .input-wrapper input[type="password"],
        .input-wrapper input[type="text"] {
            padding-right: 46px;
        }

        /* ── EYE TOGGLE ── */
        .eye-toggle {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            transition: color 0.2s ease;
        }

        .eye-toggle:hover {
            color: #1e1e2f;
        }

        .eye-toggle svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        /* ── SUBMIT BUTTON ── */
        .btn-login {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 6px;
            background: #1e1e2f;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s ease, opacity 0.2s ease;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #2d2d44;
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ── SPINNER ── */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .spinner.active {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── FOOTER ── */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #9ca3af;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px 32px;
            }
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Header -->
        <div class="login-header">
            <div class="logo-icon">M</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your admin account</p>
        </div>

        <!-- Error Message (hidden) -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Form -->
        <form id="loginForm" novalidate>
            {% csrf_token %}

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                    <!-- Eye Toggle Button -->
                    <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Toggle password visibility">
                        <!-- Eye Open SVG -->
                        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423
                                     7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007
                                     9.963 7.178.07.207.07.431 0
                                     .639C20.577 16.49 16.64 19.5 12
                                     19.5c-4.638 0-8.573-3.007-9.964-7.178z"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <!-- Eye Closed SVG (hidden initially) -->
                        <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"
                             style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M3.98 8.223A10.477 10.477 0 001.934
                                     12.222a1.012 1.012 0 000 .639C3.423
                                     16.49 7.36 19.5 12 19.5c1.658 0
                                     3.222-.392 4.6-1.09M6.228
                                     6.228A10.45 10.45 0 0112
                                     4.5c4.638 0 8.573 3.007 9.963
                                     7.178.07.207.07.431 0
                                     .639a10.496 10.496 0
                                     01-3.315 4.455"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M6.228 6.228L3 3m3.228
                                     3.228l3.65 3.65m7.894
                                     7.894L21 21m-3.228-3.228l-3.65-3.65m0
                                     0a3 3 0 10-4.243-4.243m4.242
                                     4.242L9.88 9.88"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-login" id="btnLogin">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <div class="login-footer">
            &copy; 2025 Admin Panel. All rights reserved.
        </div>
    </div>
</div>

<script>
    // ── Elements ──
    const form        = document.getElementById('loginForm');
    const emailInput  = document.getElementById('email');
    const passInput   = document.getElementById('password');
    const eyeToggle   = document.getElementById('eyeToggle');
    const eyeOpen     = document.getElementById('eyeOpen');
    const eyeClosed   = document.getElementById('eyeClosed');
    const btnLogin    = document.getElementById('btnLogin');
    const btnText     = document.getElementById('btnText');
    const spinner     = document.getElementById('spinner');
    const errorMsg    = document.getElementById('errorMessage');

    // ── Eye Toggle ──
    eyeToggle.addEventListener('click', () => {
        const isPassword = passInput.type === 'password';
        passInput.type   = isPassword ? 'text' : 'password';
        eyeOpen.style.display   = isPassword ? 'none'  : 'block';
        eyeClosed.style.display = isPassword ? 'block' : 'none';
    });

    // ── Helpers ──
    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
        emailInput.classList.add('input-error');
        passInput.classList.add('input-error');
    }

    function hideError() {
        errorMsg.classList.remove('visible');
        emailInput.classList.remove('input-error');
        passInput.classList.remove('input-error');
    }

    function setLoading(state) {
        if (state) {
            spinner.classList.add('active');
            btnText.textContent = 'Signing in…';
            btnLogin.disabled = true;
        } else {
            spinner.classList.remove('active');
            btnText.textContent = 'Sign In';
            btnLogin.disabled = false;
        }
    }

    // ── Clear errors on typing ──
    emailInput.addEventListener('input', hideError);
    passInput.addEventListener('input', hideError);

    // ── Form Submit ──
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email    = emailInput.value.trim();
        const password = passInput.value;

        // client-side check
        if (!email || !password) {
            showError('Please enter both email and password.');
            return;
        }

        setLoading(true);

        try {
            const csrfToken = form.querySelector('[name=csrfmiddlewaretoken]').value;

            const response = await fetch(window.location.href, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                btnText.textContent = 'Redirecting…';
                window.location.href = data.redirect;
            } else {
                setLoading(false);
                showError(data.message || 'Invalid email or password.');
            }
        } catch (err) {
            setLoading(false);
            showError('Something went wrong. Please try again.');
        }
    });
</script>

</body>
</html>
